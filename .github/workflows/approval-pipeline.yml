name: Deployment with Manual Approval

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: |
          echo "Building application..."
          echo "Build artifact: app-${{ github.sha }}"

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deployed to staging"

  test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests on staging
        run: |
          echo "Running smoke tests..."
          echo "All tests passed"


  approve-production:
    needs: test-staging
    runs-on: ubuntu-latest
    environment: production-approval  
    steps:
      - name: Awaiting production approval
        run: echo "Waiting for production approval..." 



  deploy-production:
    needs: [approve-production, test-staging] 
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://production.example.com

    steps:
      - name: Deploy to production
        run: echo "Deployed to production"

  post-deploy:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Verify production
        run: echo "Production smoke tests passed"

      - name: Add Job Summary
        run: |
          echo "Pipeline History:" > $GITHUB_STEP_SUMMARY
          echo "- Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy to Staging: Success" >> $GITHUB_STEP_SUMMARY
          echo "- Test Staging: Success" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy to Production: Success" >> $GITHUB_STEP_SUMMARY
          echo "- Verify Production: Success" >> $GITHUB_STEP_SUMMARY   
